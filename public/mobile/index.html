<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تنزيل تطبيق بنيان - Android</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: #f5f7fb;
        color: #0f172a;
      }
      .wrap {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .card {
        width: 100%;
        max-width: 520px;
        background: #ffffff;
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 12px 30px rgba(15, 23, 42, 0.12);
      }
      h1 {
        margin: 0 0 12px;
        font-size: 24px;
      }
      p {
        margin: 0 0 18px;
        line-height: 1.7;
        color: #334155;
      }
      .btn {
        display: inline-block;
        text-decoration: none;
        background: #1d4ed8;
        color: #fff;
        border-radius: 10px;
        padding: 12px 18px;
        font-weight: 700;
      }
      .hint {
        margin-top: 14px;
        font-size: 13px;
        color: #64748b;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="card">
        <h1>تنزيل تطبيق بنيان (Android)</h1>
        <p>
          اضغط زر التنزيل لتحميل ملف التطبيق بصيغة APK وتثبيته على جهازك.
        </p>
        <a class="btn" href="/mobile/bunyan-android.apk" download>
          تنزيل التطبيق APK
        </a>
        <div class="hint">
          إذا ظهر تحذير أمان، فعّل "التثبيت من مصادر غير معروفة" للهاتف.
        </div>
      </div>
    </div>
  </body>
</html>
